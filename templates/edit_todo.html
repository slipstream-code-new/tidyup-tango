{% extends "base.html" %}

{% block title %}Edit Todo -- Todo List{% endblock %}

{% block nav %}
<nav aria-label="Main navigation">
    <form method="post" action="/logout" class="nav-logout" hx-boost="false">
        <button type="submit" class="nav-logout__button">Sign out</button>
    </form>
</nav>
{% endblock %}

{% block content %}
<div class="auth-form">
    <h1>Edit Todo</h1>
    <div class="auth-form__message auth-form__message--error" role="alert">{% if let Some(error) = error_message %}{{ error }}{% endif %}</div>
    <form method="post" action="/todos/{{ todo_id }}/edit" class="auth-form__fields" novalidate>
        <div class="auth-form__group">
            <label for="title">Title</label>
            <input
                type="text"
                id="title"
                name="title"
                value="{{ current_title }}"
                maxlength="300"
                required
                autofocus
                aria-describedby="title-error"
                {% if error_message.is_some() %}aria-invalid="true"{% endif %}
            >
            <p class="auth-form__error" id="title-error" role="alert">{% if let Some(err) = error_message %}{{ err }}{% endif %}</p>
        </div>
        <div class="auth-form__actions">
            <button type="submit" class="auth-form__submit">Save</button>
            <a href="/todos" class="auth-form__cancel">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
