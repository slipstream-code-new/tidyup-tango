<li class="someday-maybe-item" id="someday-maybe-{{ item.id }}">
    <form
        method="post"
        action="/someday-maybe/{{ item.id }}/edit"
        class="someday-maybe-item__edit-form"
        hx-post="/someday-maybe/{{ item.id }}/edit"
        hx-target="#someday-maybe-{{ item.id }}"
        hx-swap="outerHTML"
    >
        <div class="someday-maybe-item__edit-fields">
            <label for="edit-title-{{ item.id }}" class="visually-hidden">Title</label>
            <input
                type="text"
                id="edit-title-{{ item.id }}"
                name="title"
                value="{{ item.title }}"
                maxlength="300"
                class="someday-maybe-item__edit-input"
                placeholder="Idea title"
            >
        </div>
        <div class="someday-maybe-item__edit-actions">
            <button type="submit" class="someday-maybe-item__edit-save">Save</button>
            <a
                href="/someday-maybe/{{ item.id }}"
                class="someday-maybe-item__edit-cancel"
                aria-label="Cancel editing: {{ item.title }}"
                hx-get="/someday-maybe/{{ item.id }}"
                hx-target="#someday-maybe-{{ item.id }}"
                hx-swap="outerHTML"
            >Cancel</a>
        </div>
    </form>
</li>
