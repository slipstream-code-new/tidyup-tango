name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '.claude-sessions/**'
      - '.claude/**'
      - '.team/**'
      - 'docs/**'
      - '*.md'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - '.claude-sessions/**'
      - '.claude/**'
      - '.team/**'
      - 'docs/**'
      - '*.md'
      - 'LICENSE'

env:
  CARGO_TERM_COLOR: always
  DATABASE_URL: postgres://todo_list:todo_list@127.0.0.1:5432/todo_list

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: todo_list
          POSTGRES_PASSWORD: todo_list
          POSTGRES_DB: todo_list
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features native-tls,postgres

      - name: Run database migrations
        run: sqlx migrate run

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy -- -D warnings

      - name: Run tests
        run: cargo test

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chrome

      - name: Build application for e2e tests
        run: cargo build

      - name: Run Playwright e2e tests
        run: npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  semantic-review:
    name: Request auto_review semantic review
    if: ${{ github.event_name == 'pull_request' && github.event.action != 'closed' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      AUTO_REVIEW_GATEWAY_URL: ${{ vars.AUTO_REVIEW_GATEWAY_URL }}
      AR_CI_REVIEW_TOKEN: ${{ secrets.AR_CI_REVIEW_TOKEN }}
    steps:
      - name: Skip when auto_review configuration is not available
        if: ${{ env.AUTO_REVIEW_GATEWAY_URL == '' || env.AR_CI_REVIEW_TOKEN == '' || env.AUTO_REVIEW_GATEWAY_URL == github.server_url }}
        run: |
          echo "auto_review semantic review skipped: repository variable AUTO_REVIEW_GATEWAY_URL must point at ar-gateway, secret AR_CI_REVIEW_TOKEN must match the gateway AR_CI_REVIEW_TOKEN, and the gateway URL must not be the Forgejo server URL"

      - name: Request auto_review review
        continue-on-error: true
        if: ${{ env.AUTO_REVIEW_GATEWAY_URL != '' && env.AR_CI_REVIEW_TOKEN != '' && env.AUTO_REVIEW_GATEWAY_URL != github.server_url }}
        run: |
          set -euo pipefail
          json_payload='{"owner":"${{ github.repository_owner }}","repo":"${{ github.event.repository.name }}","pr_number":${{ github.event.pull_request.number }},"head_sha":"${{ github.event.pull_request.head.sha }}"}'
          response_file="$(mktemp)"
          status="$(curl -sS --connect-timeout 5 --max-time 30 -o "$response_file" -w '%{http_code}' -X POST \
            -H "Authorization: Bearer $AR_CI_REVIEW_TOKEN" \
            -H "Content-Type: application/json" \
            --data "$json_payload" \
            "${AUTO_REVIEW_GATEWAY_URL%/}/reviews/ci")"

          if [ "$status" -eq 401 ] || [ "$status" -eq 403 ]; then
            echo "auto_review semantic review authorization failed with HTTP $status; verify the AR_CI_REVIEW_TOKEN secret matches production AR_CI_REVIEW_TOKEN" >&2
            exit 1
          fi

          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "auto_review semantic review request failed with HTTP $status" >&2
            cat "$response_file" >&2
            exit 1
          fi

          echo "auto_review semantic review requested"
